<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
<h1 class="text-center mt-4">Mark Attendance</h1>
<hr>
<form method="post">
{% csrf_token %}
<label>
Select Employee
</label>
<select name="emp_id"
class="form-control">
{% for emp in emps %}
<option value="{{ emp.id }}">
{{ emp.first_name }}
{{ emp.last_name }}
</option>
{% endfor %}
</select>
<br>
<label>Status</label>
<select name="status"
class="form-control">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>
<br>
<button type="submit" class="btn btn-success"> Mark Attendance</button>
</form>
</div>
</body>
</html>
